<!-- list of food stalls/restos w ratings + search filter -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AgnoRated | Browse All Establishments</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <!-- ================= NAVBAR ================= -->
  <nav class="navbar">
    <div class="navbar-logo">
      <img src="../assets/img/logo.png" alt="AgnoRated Logo" class="logo-img">
      <span>AgnoRated</span>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="establishments.html">Browse</a>
      <a href="login.html">Login</a>
      <a href="profile.html">Profile</a>
    </div>
  </nav>

  <!-- ================= FILTER SECTION ================= -->
  <section class="container section filters-section">
    <h1>All Establishments</h1>
    <hr> <br>
    <h1>Filters</h1>
    
    <div class="filters-container">
      <!-- Search Input -->
      <div class="filter-group">
        <label class="form-label">Search</label>
        <input type="text" class="input-field" id="search-input" placeholder="Search by name or keyword...">
      </div>

      <!-- Rating Dropdown -->
      <div class="filter-group">
        <label class="form-label">Min Rating</label>
        <select id="rating-filter" class="input-field">
          <option value="">All Ratings</option>
          <option value="5">⭐⭐⭐⭐⭐ (5 stars)</option>
          <option value="4">⭐⭐⭐⭐ (4+ stars)</option>
          <option value="3">⭐⭐⭐ (3+ stars)</option>
          <option value="2">⭐⭐ (2+ stars)</option>
          <option value="1">⭐ (1+ stars)</option>
        </select>
      </div>

      <!-- Tag Filters -->
      <div class="filter-group tags-group">
        <label class="form-label">Tags</label>
        <div class="tag-filter-container">
          <label class="tag-checkbox">
            <input type="checkbox" class="tag-filter" value="Affordable"> Affordable
          </label>
          <label class="tag-checkbox">
            <input type="checkbox" class="tag-filter" value="Fast Service"> Fast Service
          </label>
          <label class="tag-checkbox">
            <input type="checkbox" class="tag-filter" value="Student Friendly"> Student Friendly
          </label>
          <label class="tag-checkbox">
            <input type="checkbox" class="tag-filter" value="Comfort Foods"> Comfort Foods
          </label>
          <label class="tag-checkbox">
            <input type="checkbox" class="tag-filter" value="Casual Dining"> Casual Dining
          </label>
          <label class="tag-checkbox">
            <input type="checkbox" class="tag-filter" value="Hangout Spots"> Hangout Spots
          </label>
          <label class="tag-checkbox">
            <input type="checkbox" class="tag-filter" value="Fried Chicken"> Fried Chicken
          </label>
          <label class="tag-checkbox">
            <input type="checkbox" class="tag-filter" value="Coffee"> Coffee
          </label>
        </div>
      </div>

      <!-- Clear Filters -->
      <div class="filter-actions">
        <button class="btn btn-outline" id="clear-filters">Clear Filters</button>
      </div>
    </div>
  </section>

  <!-- ================= ESTABLISHMENTS GRID ================= -->
  <section class="container section">
    <div class="establishment-grid" id="establishments-grid"></div>
  </section>

  <!-- ================= FOOTER ================= -->
  <footer class="footer">
    <div class="container">
      <p class="small-text">© 2026 AgnoRated | Built by Group 7</p>
    </div>
  </footer>

  <!-- main script -->
  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>

</body>
</html>
