<!-- Login Page -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AgnoRated | Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/login-register.css">
</head>

<body>
  <!-- ================= NAVBAR ================= -->
  <nav class="navbar">
    <div class="navbar-logo">
      <img src="../assets/img/logo.png" alt="AgnoRated Logo" class="logo-img">
      <span>AgnoRated</span>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="establishments.html">Browse</a>
    </div>
  </nav>

    <div class="container">
        <div class="card" style="max-width:400px;margin:auto;">

            <h2>Login</h2>

            <!-- ================= LOGIN FORM ================= -->
            <form id="loginForm">
            
              <div class="form-group">
                  <label class="form-label">Email / Username</label>
                  <input type="text" id="identifier" class="input-field" required>
              </div>

              <div class="form-group">
                  <label class="form-label">Password</label>
                  <input type="password" id="password" class="input-field" required>
              </div>

              <label>
                  <input type="checkbox" id="rememberMe"> Remember me
              </label>

              <br><br>

              <div class="form-actions">
                  <button type="submit" class="btn btn-primary">Login</button>
                  <a href="register.html" class="button-link">Create new account</a>
              </div>
            </form>
        </div>
    </div>

  <!-- ================= FOOTER ================= -->
  <footer class="footer" id="footer">
    <div class="container">
      <p class="small-text">© 2026 AgnoRated | Built by Group 7</p>
    </div>
</body>

<script src="../js/login.js"></script>

</html>
