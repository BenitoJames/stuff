<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AgnoRated | Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/login-register.css">
</head>

    <script src="../js/register.js"></script> 

<body>
  <!-- ================= NAVBAR ================= -->
  <nav class="navbar">
    <div class="navbar-logo">
      <img src="../assets/img/logo.png" alt="AgnoRated Logo" class="logo-img">
      <span>AgnoRated</span>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="establishments.html">Browse</a>
    </div>
  </nav>

        <div class="container">

            <div class="card" style="max-width:400px;margin:auto;">

                <h2>Create Account</h2>

                <form id="registerForm">

                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" id="username" class="input-field" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="input-field" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="input-field" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="input-field" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Avatar Upload</label>
                        <input type="file" id="avatar" accept="image/*">
                        <img id="avatarPreview" style="display:none; width:160px; margin-top:10px; border-radius:50%;">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Bio</label><br>
                        <textarea id="bio" class="bio-text-field"></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Register</button>
                    </div>
                </form>
            </div>
        </div>

  <!-- ================= FOOTER ================= -->
  <footer class="footer">
    <div class="container">
      <p class="small-text">© 2026 AgnoRated | Built by Group 7</p>
    </div>
  </footer>
</body>     
</html>
