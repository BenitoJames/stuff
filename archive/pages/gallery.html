<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery - AgnoRated</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/gallery.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-logo">
            <img src="../assets/img/logo.png" alt="AgnoRated Logo" class="logo-img">
            <span>AgnoRated</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="establishments.html">Browse</a>
            <a href="login.html">Login</a>
            <a href="profile.html">Profile</a>
        </div>
    </nav>

    <main class="section">
        <div class="container">
            <div class="gallery-header">
                <h1 id="establishmentName">Loading...</h1>
                <p class="subtitle">Photos from the community</p>
            </div>

            <!-- Filter Options -->
            <div class="gallery-filters">
                <button class="filter-btn active" data-filter="all">All Photos</button>
                <button class="filter-btn" data-filter="food">Food</button>
                <button class="filter-btn" data-filter="ambiance">Ambiance</button>
                <button class="filter-btn" data-filter="menu">Menu</button>
            </div>

            <!-- Gallery Grid -->
            <div class="gallery-grid" id="galleryGrid">
                <!-- Gallery items will be dynamically inserted here -->
            </div>
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
        <button class="lightbox-nav lightbox-prev" id="lightboxPrev">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </button>
        <button class="lightbox-nav lightbox-next" id="lightboxNext">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"/>
            </svg>
        </button>
        <div class="lightbox-content">
            <img src="" alt="" id="lightboxImage">
            <div class="lightbox-info">
                <p class="lightbox-caption" id="lightboxCaption"></p>
                <p class="lightbox-user" id="lightboxUser"></p>
            </div>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/gallery.js"></script>
</body>
</html>
