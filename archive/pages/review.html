<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write a Review - AgnoRated</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/review.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-logo">
            <img src="../assets/img/logo.png" alt="AgnoRated Logo" class="logo-img">
            <span>AgnoRated</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="establishments.html">Browse</a>
            <a href="login.html">Login</a>
            <a href="profile.html">Profile</a>
        </div>
    </nav>

    <main class="section">
        <div class="container">
            <div class="review-form-header">
                <h1>Write Your Review</h1>
                <p class="subtitle">Share your dining experience with the DLSU community</p>
            </div>

            <form class="review-form" id="reviewForm">
                <!-- Establishment Selection -->
                <div class="form-group">
                    <label class="form-label" for="establishment">Establishment *</label>
                    <select class="input-field" id="establishment" name="establishment" required>
                        <option value="">Select a food stall or restaurant</option>
                        <!-- Options will be populated from JSON -->
                    </select>
                </div>

                <!-- Review Title -->
                <div class="form-group">
                    <label class="form-label" for="reviewTitle">Review Title *</label>
                    <input 
                        type="text" 
                        class="input-field" 
                        id="reviewTitle" 
                        name="reviewTitle"
                        placeholder="Sum up your experience in one line"
                        maxlength="100"
                        required
                    >
                    <span class="char-count">0/100</span>
                </div>

                <!-- Star Rating -->
                <div class="form-group">
                    <label class="form-label">Your Rating *</label>
                    <div class="stars-input" id="starsInput">
                        <button type="button" class="star-btn" data-value="1">
                            <svg class="star-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                            </svg>
                        </button>
                        <button type="button" class="star-btn" data-value="2">
                            <svg class="star-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                            </svg>
                        </button>
                        <button type="button" class="star-btn" data-value="3">
                            <svg class="star-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                            </svg>
                        </button>
                        <button type="button" class="star-btn" data-value="4">
                            <svg class="star-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                            </svg>
                        </button>
                        <button type="button" class="star-btn" data-value="5">
                            <svg class="star-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                            </svg>
                        </button>
                    </div>
                    <input type="hidden" id="ratingValue" name="rating" required>
                    <p class="rating-text" id="ratingText">Click to rate</p>
                </div>

                <!-- Review Content -->
                <div class="form-group">
                    <label class="form-label" for="reviewContent">Your Review *</label>
                    <textarea 
                        class="input-field textarea-field" 
                        id="reviewContent" 
                        name="reviewContent"
                        rows="8"
                        placeholder="Tell us about the food, service, ambiance, value for money..."
                        maxlength="1000"
                        required
                    ></textarea>
                    <span class="char-count">0/1000</span>
                </div>

                <!-- Tags -->
                <div class="form-group">
                    <label class="form-label">Tags (Optional)</label>
                    <p class="form-helper">Select tags that describe this establishment</p>
                    <div class="tag-container" id="tagContainer">
                        
                        <button type="button" class="tag tag-selectable" data-tag="affordable">Affordable</button>
                        <button type="button" class="tag tag-selectable" data-tag="western">Western</button>
                        <button type="button" class="tag tag-selectable" data-tag="spicy">Spicy</button>
                        <button type="button" class="tag tag-selectable" data-tag="long-lines">Long Lines</button>
                        <button type="button" class="tag tag-selectable" data-tag="lutong-bahay">Lutong Bahay</button>
                        <button type="button" class="tag tag-selectable" data-tag="vegetarian">Vegetarian</button>
                        <button type="button" class="tag tag-selectable" data-tag="quick-service">Quick Service</button>
                        <button type="button" class="tag tag-selectable" data-tag="cozy">Cozy Ambiance</button>
                    </div>
                    <input type="hidden" id="selectedTags" name="tags">
                </div>

                <!-- Image Upload -->
                <div class="form-group">
                    <label class="form-label">Add Photos (Optional)</label>
                    <p class="form-helper">Help others by showing what you ate!</p>
                    <div class="image-upload-area" id="imageUploadArea">
                        <input 
                            type="file" 
                            id="imageUpload" 
                            name="images"
                            accept="image/*"
                            multiple
                            hidden
                        >
                        <button type="button" class="upload-trigger" id="uploadTrigger">
                            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                            <span>Click to upload images</span>
                            <span class="upload-hint">PNG, JPG up to 5MB each</span>
                        </button>
                        <div class="image-preview-container" id="imagePreviewContainer">
                            <!-- Image previews will appear here -->
                        </div>
                    </div>
                </div>

                <!-- Form Actions -->
                <div class="form-actions">
                    <button type="button" class="btn btn-outline" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Publish Review</button>
                </div>
            </form>
        </div>
    </main>

    <script src="../js/data.js"></script>
    <script src="../js/review.js"></script>
</body>
</html>
