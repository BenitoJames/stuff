<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AgnoRated |Edit Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>



<body>

  <!-- ================= NAVBAR ================= -->
  <nav class="navbar">
    <div class="navbar-logo">
      <img src="../assets/img/logo.png" class="logo-img">
      <span>AgnoRated</span>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="establishments.html">Browse</a>
      <a href="profile.html">Profile</a>
      <a href="login.html" id="logout">Logout</a>
    </div>
  </nav>


<!-- MAIN CONTAINER -->
<div class="container">

    <section class="section">

        <!-- CENTERED EDIT CARD -->
        <div class="card" style="max-width:500px;margin:auto;">

            <h2>Edit Profile</h2>

            <form method="POST" enctype="multipart/form-data" onsubmit="document.location.href='profile.html'; return false;" >

                <div class="form-group">
                    <label class="form-label">Update Avatar</label>
                        <input type="file" id="avatar" accept="image/*">
                        <img id="avatarPreview" style="display:none; width:12rem; height:12rem; border-radius:50%; object-fit:cover;">
                </div>

                <div class="form-group">
                    <label class="form-label">Update Description</label>
                    <textarea name="description" class="input-field"></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </section>
</div>


<!-- FOOTER -->
<footer class="footer">
  <div class="container">
    <p class="small-text">© 2026 AgnoRated | Built by Group 7</p>
  </div>
</footer>
</body>
<script src="../js/profile.js"></script>

</html>
